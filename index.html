      stopBgm();
      score += 2500;
      highScore = Math.max(highScore, Math.floor(score));
      localStorage.setItem("blueTiltHighScore", String(highScore));
      overlay.classList.add("visible");
      overlayTitle.textContent = "CORE SHUTDOWN";
      setMobileControlsActive(false);
      difficultySelect.classList.add("hidden");
      controlSelect.classList.add("hidden");
      introActions.classList.add("hidden");
      pauseControls.classList.add("hidden");
      overlayLine1.textContent = "폭주한 AI 프로그램의 제어권을 회수했습니다. 시스템은 아직 불안정하지만, 핵심 코어는 정지되었습니다.";
      overlayLine2.textContent = `현재 점수 ${Math.floor(score)} | 최고 점수 ${highScore}`;
      overlayLine3.textContent = "Space를 눌러 다시 실행";
      shake = 18;
      playSound("win");
      for (let i = 0; i < 90; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 520;
        sparks.push({ x: boss.x, y: boss.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.9, max: 0.9, color: i % 3 ? "#43d9ff" : "#ffd66b" });
      }
    }

    // 전투 월드 갱신: 충돌, 탄막 이동, 레이저/아이템/이펙트 수명을 처리한다.
    function updateWorld(dt) {
      trimEffectLists();

      if (mode === "bullet" && boss.alive && player.alive) {
        const rr = boss.r + player.r * 0.8;
        if (distSq(player.x, player.y, boss.x, boss.y) < rr * rr) {
          if (player.dashTime > 0) {
            dashHitBoss();
          } else if (player.invuln <= 0 && boss.groggyTimer <= 0) {
            takeHit();
            return;
          }
        }
      }

      for (let i = lasers.length - 1; i >= 0; i--) {
        const laser = lasers[i];
        laser.life -= dt;
        const nowFire = laser.life <= laser.fire + 0.18 && laser.life > 0.18;
        const justBeforeFire = laser.life <= laser.fire + 0.34 && laser.life > laser.fire + 0.18;
        if (!laser.fired && nowFire) {
          laser.fired = true;
          setBossMove("LASER BREAK");
          shake = Math.max(shake, 12);
          playSound("laserFire");
        }
        if (player.alive && player.dashTime > 0 && !laser.grazed && (nowFire || justBeforeFire)) {
          const dist = distanceToSegment(player.x, player.y, laser.x1, laser.y1, laser.x2, laser.y2);
          if (dist < laser.width * 0.48 + player.r + (justBeforeFire ? 34 : 24)) {
            awardLaserDashBreak(laser, justBeforeFire ? "JUST" : "LASER DASH");
          }
        }
        if (player.alive && player.invuln <= 0 && nowFire) {
          const dist = distanceToSegment(player.x, player.y, laser.x1, laser.y1, laser.x2, laser.y2);
          if (dist < laser.width * 0.48 + player.r * 0.5) {
            takeHit();
            return;
          }
        }
        if (laser.life <= 0) lasers.splice(i, 1);
      }

      for (let i = pendingSnipes.length - 1; i >= 0; i--) {
        const snipe = pendingSnipes[i];
        snipe.timer -= dt;
        if (snipe.timer <= snipe.exposedAt) {
          boss.exposedTimer = Math.max(boss.exposedTimer, snipe.timer + 0.08);
        }
        if (snipe.timer <= 0) {
          for (let j = -3; j <= 3; j++) {
            const a = snipe.angle + j * 0.055;
            spawnBullet(snipe.x, snipe.y, Math.cos(a) * 345, Math.sin(a) * 345, 7, "#ffffff", 0, { kind: "sniper" });
          }
          spawnWarning(snipe.x, snipe.y, snipe.targetX, snipe.targetY, "#ffffff");
          playSound("laserFire");
          pendingSnipes.splice(i, 1);
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.age += dt;
        const wob = b.wobble ? Math.sin(b.age * 8) * b.wobble * 80 : 0;
        b.x += (b.vx + Math.sin(b.age * 5) * wob) * dt;
        b.y += (b.vy + Math.cos(b.age * 4) * wob) * dt;
        if (b.splitTime && b.age >= b.splitTime) {
          const colors = bossPalette();
          const count = b.splitCount || 14;
          for (let j = 0; j < count; j++) {
            const a = j * Math.PI * 2 / count + Math.random() * 0.16;
            const speed = 130 + Math.random() * 145 + boss.phase * 16;
            spawnBullet(b.x, b.y, Math.cos(a) * speed, Math.sin(a) * speed, 4.2, colors.bullet, boss.phase >= 2 ? 0.18 : 0);
          }
          for (let j = 0; j < 12; j++) {
            const a = Math.random() * Math.PI * 2;
            const s = 80 + Math.random() * 220;
            sparks.push({ x: b.x, y: b.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.35, max: 0.35, color: colors.warn });
          }
          shake = Math.max(shake, 5);
          bullets.splice(i, 1);
          continue;
        }
        if (b.x < -120 || b.x > width + 120 || b.y < -120 || b.y > height + 120) {
          bullets.splice(i, 1);
          continue;
        }
        if (player.alive && player.dashTime > 0 && b.kind !== "burstBomb") {
          const dashCutR = b.r + player.r + 18 + Math.min(12, player.dashChain * 0.8);
          if (distSq(b.x, b.y, player.x, player.y) < dashCutR * dashCutR) {
            dashCutBullet(b, player.dashChain + 1);
            bullets.splice(i, 1);
            registerClears(1, b.x, b.y);
            continue;
          }
        }
        const hitR = b.r + player.r * 0.55;
        if (player.alive && player.invuln <= 0 && distSq(b.x, b.y, player.x, player.y) < hitR * hitR) {
          takeHit();
          return;
        }
      }

      for (let i = shots.length - 1; i >= 0; i--) {
        const shot = shots[i];
        shot.life -= dt;
        if (boss.alive && shot.homing > 0) {
          const desired = Math.atan2(boss.y - shot.y, boss.x - shot.x);
          const current = Math.atan2(shot.vy, shot.vx);
          const turn = Math.atan2(Math.sin(desired - current), Math.cos(desired - current)) * shot.homing;
          const speed = Math.sqrt(shot.vx * shot.vx + shot.vy * shot.vy);
          const next = current + turn;
          shot.vx = Math.cos(next) * speed;
          shot.vy = Math.sin(next) * speed;
        }
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
        shot.scanClock -= dt;
        let cleared = 0;
        if (shot.scanClock <= 0) {
          shot.scanClock = 0.06;
          cleared = clearNearbyBullets(shot.x, shot.y, shot.r + 7, true, Math.max(0, Math.min(4, shot.pierce)));
        }
        if (cleared > 0) shot.pierce -= cleared;
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (b.kind !== "burstBomb" || !b.breakable) continue;
          const rr = b.r + shot.r + 4;
          if (distSq(shot.x, shot.y, b.x, b.y) < rr * rr) {
            bullets.splice(j, 1);
            breakBurstBomb(b, shot.charged ? "CHARGE" : "SHOT");
            shot.pierce -= shot.charged ? 1 : 2;
            break;
          }
        }
        const bossHitR = boss.r + shot.r;
        if (boss.alive && distSq(shot.x, shot.y, boss.x, boss.y) < bossHitR * bossHitR) {
          score += 140 + shot.damage * 4;
          cancelSniperWithShot(shot);
          bossTakeDamage(shot.damage, shot.x, shot.y, Math.min(2.4, 0.85 + shot.r / 18), `${shot.damage}`);
          shot.pierce -= 2;
        }
        if (shot.life <= 0 || shot.pierce <= 0 || shot.x < -80 || shot.x > width + 80 || shot.y < -80 || shot.y > height + 80) {
          shots.splice(i, 1);
        }
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.age += dt;
        item.life -= dt;
        item.vx *= Math.pow(0.55, dt);
        item.vy += Math.sin(item.age * 2.6 + item.bob) * 9 * dt;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        if (item.x < 28 || item.x > width - 28) item.vx *= -0.8;
        if (item.y < 70 || item.y > height - 38) item.vy *= -0.8;
        item.x = Math.max(28, Math.min(width - 28, item.x));
        item.y = Math.max(70, Math.min(height - 38, item.y));
        const pickupR = item.r + player.r + 8;
        if (player.alive && distSq(item.x, item.y, player.x, player.y) < pickupR * pickupR) {
          applyItem(item.type);
          items.splice(i, 1);
          continue;
        }
        if (item.life <= 0) items.splice(i, 1);
      }

      for (let i = trails.length - 1; i >= 0; i--) {
        trails[i].life -= dt;
        if (trails[i].life <= 0) trails.splice(i, 1);
      }
      for (let i = warnings.length - 1; i >= 0; i--) {
        warnings[i].life -= dt;
        if (warnings[i].life <= 0) warnings.splice(i, 1);
      }
      for (let i = slashes.length - 1; i >= 0; i--) {
        slashes[i].life -= dt;
        if (slashes[i].life <= 0) slashes.splice(i, 1);
      }
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.life -= dt;
        s.vx *= Math.pow(0.02, dt);
        s.vy *= Math.pow(0.02, dt);
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.life <= 0) sparks.splice(i, 1);
      }
      for (let i = impactRings.length - 1; i >= 0; i--) {
        const ring = impactRings[i];
        ring.life -= dt;
        ring.radius += dt * 155;
        if (ring.life <= 0) impactRings.splice(i, 1);
      }
      for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 38 * dt;
        if (p.life <= 0) popups.splice(i, 1);
      }
      shake = Math.max(0, shake - dt * 30);
    }

    function drawGrid() {
      ctx.save();
      ctx.globalAlpha = 0.075;
      ctx.strokeStyle = "#1d4051";
      ctx.lineWidth = 1;
      const size = 58;
      const ox = (time * -24) % size;
      const oy = (time * -16) % size;
      for (let x = ox; x < width; x += size) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = oy; y < height; y += size) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPlayerLike(x, y, angle, alpha, scale, tilt) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle + tilt);
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#43d9ff";
      ctx.fillStyle = "#43d9ff";
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-11, -11);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-11, 11);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = alpha * 0.65;
      ctx.strokeStyle = "#e9f4ff";
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#e9f4ff";
      ctx.beginPath();
      ctx.arc(-1, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = alpha * 0.4;
      ctx.fillStyle = "#071018";
      ctx.beginPath();
      ctx.arc(1, 0, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function itemVisual(type) {
      if (type === "blade") return { label: "B", color: "#43d9ff", name: "BLADE" };
      if (type === "barrier") return { label: "O", color: "#ffd66b", name: "BARRIER" };
      if (type === "bomb") return { label: "X", color: "#ff4c78", name: "BOMB" };
      return { label: "A", color: "#a77cff", name: "OVERCLOCK" };
    }

    function drawBoss() {
      if (!boss.alive && boss.hp <= 0) return;
      const colors = bossPalette();
      ctx.save();
      ctx.translate(boss.x + boss.hitKickX, boss.y + boss.hitKickY);
      const groggyPulse = boss.groggyTimer > 0 ? 0.16 + Math.sin(time * 14) * 0.04 : 0;
      const exposedPulse = boss.exposedTimer > 0 ? 0.12 + Math.sin(time * 24) * 0.05 : 0;
      const phasePulse = boss.phaseShiftTimer > 0 ? 0.22 + Math.sin(time * 20) * 0.07 : 0;
      const pulse = 1 + Math.sin(boss.pulse * 8) * 0.05 + boss.hurtPulse * 0.13 + groggyPulse + exposedPulse + phasePulse;
      ctx.scale(pulse, pulse);
      ctx.shadowBlur = boss.hitFlash > 0 || boss.groggyTimer > 0 || boss.phaseShiftTimer > 0 ? 28 : 10;
      ctx.shadowColor = boss.phaseShiftTimer > 0 ? "#ffffff" : boss.groggyTimer > 0 ? "#ffd66b" : boss.exposedTimer > 0 ? "#ffffff" : boss.hitFlash > 0 ? "#ffffff" : colors.core;
      ctx.fillStyle = boss.phaseShiftTimer > 0 ? "#ffffff" : boss.groggyTimer > 0 ? "#ffd66b" : boss.exposedTimer > 0 ? "#ffffff" : boss.hitFlash > 0 ? "#ffffff" : colors.core;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = Math.PI * 2 * i / 8 + time * 0.8;
        const r = boss.r * (i % 2 ? 0.76 : 1.08);
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 0.58;
      ctx.strokeStyle = "#e9f4ff";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = 0.32;
      ctx.strokeStyle = boss.phaseShiftTimer > 0 ? "#ffffff" : boss.groggyTimer > 0 ? "#ffd66b" : boss.exposedTimer > 0 ? "#ffffff" : colors.warn;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, boss.r + 12 + Math.sin(time * 5) * 4, 0, Math.PI * 2);
      ctx.stroke();
      if (boss.hurtPulse > 0) {
        ctx.globalAlpha = boss.hurtPulse * 0.55;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2 + boss.hurtPulse * 5;
        ctx.beginPath();
        ctx.arc(0, 0, boss.r + 24 + (1 - boss.hurtPulse) * 38, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (boss.groggyTimer > 0 || boss.exposedTimer > 0 || boss.phaseShiftTimer > 0) {
        ctx.globalAlpha = boss.phaseShiftTimer > 0 ? 0.78 : boss.groggyTimer > 0 ? 0.65 : 0.52;
        ctx.strokeStyle = boss.phaseShiftTimer > 0 ? colors.warn : boss.groggyTimer > 0 ? "#ffd66b" : "#ffffff";
        ctx.lineWidth = boss.phaseShiftTimer > 0 ? 6 : boss.groggyTimer > 0 ? 5 : 3;
        ctx.setLineDash([10, 8]);
        ctx.beginPath();
        ctx.arc(0, 0, boss.r + 34 + Math.sin(time * 10) * 5, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawArenaAtmosphere() {
      ctx.save();
      const colors = bossPalette();
      ctx.globalAlpha = 0.16;
      const phaseWash = ctx.createLinearGradient(0, 0, width, height);
      phaseWash.addColorStop(0, colors.core);
      phaseWash.addColorStop(0.45, "rgba(7, 16, 24, 0)");
      phaseWash.addColorStop(1, colors.warn);
      ctx.fillStyle = phaseWash;
      ctx.fillRect(0, 0, width, height);

      const coreGlow = ctx.createRadialGradient(width / 2, height * 0.24, 20, width / 2, height * 0.24, Math.max(width, height) * 0.58);
      coreGlow.addColorStop(0, colors.core);
      coreGlow.addColorStop(0.34, "rgba(167, 124, 255, 0.06)");
      coreGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = coreGlow;
      ctx.fillRect(0, 0, width, height);

      ctx.globalAlpha = 0.055;
      ctx.fillStyle = "#ffffff";
      const scanOffset = Math.floor((time * 38) % 8);
      for (let y = scanOffset; y < height; y += 8) {
        ctx.fillRect(0, y, width, 1);
      }

      const vignette = ctx.createRadialGradient(width / 2, height / 2, Math.min(width, height) * 0.2, width / 2, height / 2, Math.max(width, height) * 0.72);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,0.48)");
      ctx.globalAlpha = 1;
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawRhythmCue() {
      if (!boss.alive || mode !== "bullet") return;
      const colors = bossPalette();
      const ring = 44 + (1 - beatPulse) * 78;
      ctx.save();
      ctx.globalAlpha = 0.12 + beatPulse * 0.52;
      ctx.strokeStyle = colors.warn;
      ctx.lineWidth = 2 + beatPulse * 5;
      ctx.shadowBlur = 8;
      ctx.shadowColor = colors.warn;
      ctx.beginPath();
      ctx.arc(boss.x, boss.y, ring, 0, Math.PI * 2);
      ctx.stroke();

      const next = Math.max(0, Math.min(1, 1 - beatClock / BEAT));
      ctx.globalAlpha = 0.35;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(boss.x, boss.y, boss.r + 24, -Math.PI / 2, -Math.PI / 2 + next * Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = 0.62 + beatPulse * 0.28;
      ctx.fillStyle = "#e9f4ff";
      ctx.font = "700 12px Arial, Helvetica, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(boss.attackName, boss.x, boss.y - boss.r - 34);
      ctx.restore();
    }

    // 캔버스 렌더링: 배경부터 전투 이펙트까지 한 프레임을 그린다.
    function renderGame() {
      if (canvas.style.display === "none") return;
      ctx.save();
      ctx.clearRect(0, 0, width, height);
      const renderShake = mode === "upgrade" ? 0 : shake;
      const sx = renderShake ? (Math.random() - 0.5) * renderShake : 0;
      const sy = renderShake ? (Math.random() - 0.5) * renderShake : 0;
      ctx.translate(sx, sy);

      drawArenaAtmosphere();
      drawGrid();

      drawRhythmCue();
      drawBoss();

      for (const laser of lasers) {
        const firing = laser.life <= laser.fire + 0.18 && laser.life > 0.18;
        const chargeLeft = Math.max(0, laser.life - laser.fire - 0.18);
        const chargeRatio = laser.charge ? 1 - Math.min(1, chargeLeft / laser.charge) : 1;
        ctx.save();
        ctx.strokeStyle = laser.color;
        ctx.lineCap = "round";
        ctx.shadowColor = laser.color;
        if (firing) {
          ctx.globalAlpha = 0.82;
          ctx.lineWidth = laser.width;
          ctx.shadowBlur = 16;
          ctx.beginPath();
          ctx.moveTo(laser.x1, laser.y1);
          ctx.lineTo(laser.x2, laser.y2);
          ctx.stroke();
          ctx.globalAlpha = 0.95;
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = Math.max(4, laser.width * 0.28);
          ctx.beginPath();
          ctx.moveTo(laser.x1, laser.y1);
          ctx.lineTo(laser.x2, laser.y2);
          ctx.stroke();
        } else {
          ctx.globalAlpha = 0.18 + chargeRatio * 0.48;
          ctx.lineWidth = 2 + chargeRatio * 5;
          ctx.setLineDash([16 - chargeRatio * 8, 12]);
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.moveTo(laser.x1, laser.y1);
          ctx.lineTo(laser.x2, laser.y2);
          ctx.stroke();
        }
        ctx.restore();
      }

      for (const w of warnings) {
        const t = w.life / w.max;
        ctx.save();
        ctx.globalAlpha = t * 0.33;
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 10]);
        ctx.beginPath();
        ctx.moveTo(w.x1, w.y1);
        ctx.lineTo(w.x2, w.y2);
        ctx.stroke();
        ctx.restore();
      }

      for (const snipe of pendingSnipes) {
        const charge = 1 - Math.max(0, snipe.timer / snipe.max);
        const exposed = snipe.timer <= snipe.exposedAt;
        ctx.save();
        ctx.globalAlpha = exposed ? 0.82 : 0.28 + charge * 0.38;
        ctx.strokeStyle = exposed ? "#ffffff" : "#ff4c78";
        ctx.lineWidth = exposed ? 4 : 2;
        ctx.shadowBlur = exposed ? 14 : 6;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.setLineDash(exposed ? [] : [12, 10]);
        ctx.beginPath();
        ctx.moveTo(snipe.x, snipe.y);
        ctx.lineTo(snipe.targetX, snipe.targetY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(snipe.x, snipe.y, 16 + charge * 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      for (const item of items) {
        const visual = itemVisual(item.type);
        const bob = Math.sin(item.age * 4 + item.bob) * 5;
        const fade = Math.min(1, item.life / 1.5);
        ctx.save();
        ctx.translate(item.x, item.y + bob);
        ctx.globalAlpha = Math.max(0.25, fade);
        ctx.shadowBlur = 8;
        ctx.shadowColor = visual.color;
        ctx.fillStyle = visual.color;
        ctx.beginPath();
        ctx.arc(0, 0, item.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#071018";
        ctx.font = "700 13px Arial, Helvetica, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(visual.label, 0, 1);
        ctx.restore();
      }

      for (const t of trails) {
        const a = Math.max(0, t.life / t.max);
        drawPlayerLike(t.x, t.y, t.angle, a * 0.42, 1 + (1 - a) * 0.35, t.tilt);
      }

      for (const b of bullets) {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = b.color;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 1.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.72;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.22, b.y - b.r * 0.22, Math.max(1.3, b.r * 0.32), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const shot of shots) {
        ctx.save();
        ctx.shadowBlur = 14;
        ctx.shadowColor = shot.color;
        ctx.fillStyle = shot.color;
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, shot.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.28;
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, shot.r * 2.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, Math.max(2, shot.r * 0.28), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const slashMark of slashes) {
        const a = slashMark.life / slashMark.max;
        ctx.save();
        ctx.translate(slashMark.x, slashMark.y);
        ctx.rotate(slashMark.angle);
        ctx.globalAlpha = a;
        ctx.strokeStyle = "#e9f4ff";
        ctx.lineWidth = 6;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#43d9ff";
        ctx.beginPath();
        ctx.arc(0, 0, slashMark.range, -0.52, 0.52);
        ctx.stroke();
        ctx.strokeStyle = "#43d9ff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, slashMark.range * 0.72, -0.42, 0.42);
        ctx.stroke();
        ctx.restore();
      }

      for (const ring of impactRings) {
        const a = Math.max(0, ring.life / ring.max);
        ctx.save();
        ctx.globalAlpha = a * 0.75;
        ctx.strokeStyle = ring.color;
        ctx.lineWidth = Math.max(1, ring.width * a);
        ctx.shadowBlur = 10;
        ctx.shadowColor = ring.color;
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.radius + (1 - a) * 22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      for (const s of sparks) {
        const a = s.life / s.max;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx * 0.035, s.y - s.vy * 0.035);
        ctx.stroke();
        ctx.restore();
      }

      if (player.alive) {
        const tilt = player.dashTime > 0 ? Math.sin(time * 90) * 0.08 : 0;
        if (player.charging && player.charge > 0) {
          const chargeRatio = Math.min(1, player.charge / 1.15);
          ctx.save();
          ctx.globalAlpha = 0.3 + chargeRatio * 0.45;
          ctx.strokeStyle = player.shotTimer > 0 ? "#a77cff" : "#43d9ff";
          ctx.lineWidth = 2 + chargeRatio * 4;
          ctx.shadowBlur = 8;
          ctx.shadowColor = ctx.strokeStyle;
          ctx.beginPath();
          ctx.arc(player.x, player.y, 22 + chargeRatio * 18, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(player.x, player.y);
          ctx.lineTo(player.x + Math.cos(player.angle) * (90 + chargeRatio * 55), player.y + Math.sin(player.angle) * (90 + chargeRatio * 55));
          ctx.stroke();
          ctx.restore();
        }
        if (player.shield > 0) {
          ctx.save();
          ctx.shadowBlur = 8;
          ctx.shadowColor = "#ffd66b";
          for (let i = 0; i < player.shield; i++) {
            const pulse = Math.sin(time * 8 + i * 0.9) * 0.08;
            ctx.globalAlpha = 0.28 - i * 0.045 + pulse;
            ctx.strokeStyle = i === 0 ? "#fff3a6" : "#ffd66b";
            ctx.lineWidth = Math.max(1.6, 3 - i * 0.35);
            ctx.beginPath();
            ctx.arc(player.x, player.y, 27 + i * 6 + pulse * 12, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
        if (player.reviveTimer > 0) {
          const reviveRatio = player.reviveTimer / 1.1;
          ctx.save();
          ctx.globalAlpha = 0.18 + reviveRatio * 0.32;
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 3;
          ctx.shadowBlur = 18;
          ctx.shadowColor = "#43d9ff";
          ctx.beginPath();
          ctx.arc(player.x, player.y, 34 + (1 - reviveRatio) * 46, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 0.16 + reviveRatio * 0.24;
          ctx.strokeStyle = "#43d9ff";
          ctx.setLineDash([8, 8]);
          ctx.beginPath();
          ctx.arc(player.x, player.y, 54 + (1 - reviveRatio) * 62, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        drawPlayerLike(player.x, player.y, player.angle, player.invuln > 0 ? 0.72 : 1, 1, tilt);
      }

      for (const p of popups) {
        const a = Math.max(0, p.life / p.max);
        ctx.save();
        ctx.globalAlpha = Math.min(1, a * 1.45);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.font = `700 ${p.size + (1 - a) * 4}px Arial, Helvetica, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
      }

      if (mode === "finalWarning" || runStage === 2) {
        ctx.save();
        ctx.globalAlpha = mode === "finalWarning" ? 0.18 + warningPulse * 0.22 : 0.06;
        ctx.fillStyle = "#ff1f46";
        ctx.fillRect(-20, -20, width + 40, height + 40);
        ctx.globalAlpha = mode === "finalWarning" ? 0.28 + warningPulse * 0.3 : 0.08;
        ctx.strokeStyle = "#ff4c78";
        ctx.lineWidth = 3 + warningPulse * 4;
        ctx.strokeRect(14, 14, width - 28, height - 28);
        ctx.restore();
      }

      ctx.restore();
    }

    function loop(now) {
      try {
        const dt = Math.min(Math.max((now - last) / 1000, 0), 0.033);
        last = now;
        if (hitStop > 0 && hasActiveDangerTelegraph() && !gameOver) {
          hitStop = Math.max(0, hitStop - dt);
          updateDangerTelegraphsOnly(dt);
        } else if (hitStop > 0) {
          hitStop = Math.max(0, hitStop - dt);
        } else if (mode === "finalWarning" && !gameOver) {
          hitStop = Math.max(0, hitStop - dt);
          time += dt;
          finalWarningElapsed += dt;
          finalWarningTimer = Math.max(0, finalWarningTimer - dt);
          if (finalRefillTargetHp > 0) {
            const refillRatio = Math.min(1, finalWarningElapsed / FINAL_WARNING_DURATION);
            const eased = 1 - Math.pow(1 - refillRatio, 2.6);
            boss.hp = Math.min(boss.maxHp, finalRefillStartHp + (finalRefillTargetHp - finalRefillStartHp) * eased);
            boss.hitFlash = Math.max(boss.hitFlash, 0.08);
            boss.hurtPulse = Math.max(boss.hurtPulse, 0.55);
          }
          warningPulse = Math.max(0, warningPulse - dt * 2.2);
          warningSirenClock -= dt;
          if (warningSirenClock <= 0) {
            warningSirenClock = 0.62;
            warningPulse = 1;
            shake = Math.max(shake, 12 + (FINAL_WARNING_DURATION - finalWarningTimer) * 2.4);
            playSound("siren");
            overlayTitle.textContent = finalWarningTimer > 1.7 ? "- WARNING -" : "- FINAL CORE -";
            overlayLine1.textContent = finalWarningTimer > 1.7 ? "보스 코어 체력 재충전 중." : "체력 충전 완료. 최종 패턴 진입.";
            overlayLine2.textContent = `CORE HP ${Math.round((boss.hp / boss.maxHp) * 100)}%`;
          }
          updateWorld(dt);
          if (finalWarningTimer <= 0) startFinalBoss();
        } else if (paused) {
          // Keep rendering the current frame without advancing combat state.
        } else if (mode === "bullet" && started && !gameOver) {
          hitStop = Math.max(0, hitStop - dt);
          time += dt;
          score += dt * 100 + bullets.length * dt * 0.4;
          updateRhythm(dt);
          updateBoss(dt);
          updatePatterns(dt);
          updatePlayer(dt);
          updateWorld(dt);
        } else {
          updateWorld(dt);
        }
        trimEffectLists();
        hudClock -= dt;
        if (hudClock <= 0) {
          hudClock = 0.08;
          const dashRatio = player.dashMax ? player.dashEnergy / player.dashMax : 0;
          const attackMax = player.powerTimer > 0 ? 0.22 : 0.32;
          const attackRatio = player.attackCooldown <= 0 ? 1 : 1 - player.attackCooldown / attackMax;
          const bossRatio = boss.maxHp ? boss.hp / boss.maxHp : 0;
          dashFill.style.transform = `scaleX(${Math.max(0, Math.min(1, dashRatio))})`;
          dashText.textContent = player.dashEnergy >= player.dashCost ? `${Math.round(Math.max(0, Math.min(1, dashRatio)) * 100)}%` : "RELOAD";
          attackFill.style.transform = `scaleX(${Math.max(0, Math.min(1, attackRatio))})`;
          attackText.textContent = player.attackCooldown <= 0 ? "READY" : "RECOVER";
          bossFill.style.transform = `scaleX(${Math.max(0, Math.min(1, bossRatio))})`;
          bossFill.style.background = boss.groggyTimer > 0 ? "linear-gradient(90deg, #ffd66b, #ffffff)" : `linear-gradient(90deg, ${bossPalette().core}, ${bossPalette().warn})`;
          bossText.textContent = `${Math.ceil(Math.max(0, bossRatio) * 100)}%`;
          const breakRatio = boss.groggyTimer > 0 ? 1 : boss.breakValue / 100;
          breakFill.style.transform = `scaleX(${Math.max(0, Math.min(1, breakRatio))})`;
          breakFill.style.background = boss.groggyTimer > 0 ? "linear-gradient(90deg, #ffd66b, #ffffff)" : boss.breakFlash > 0 ? "linear-gradient(90deg, #ffffff, #43d9ff, #ffd66b)" : "linear-gradient(90deg, #e9f4ff, #43d9ff, #ffd66b)";
          breakText.textContent = boss.groggyTimer > 0 ? `GROGGY ${boss.groggyTimer.toFixed(1)}s` : `${Math.floor(boss.breakValue)}%`;
          const statuses = [];
          if (boss.phaseShiftTimer > 0) statuses.push(`PHASE SHIFT ${boss.phaseShiftTimer.toFixed(1)}s`);
          if (boss.groggyTimer > 0) statuses.push(`GROGGY DAMAGE UP ${boss.groggyTimer.toFixed(1)}s`);
          statuses.push(`LIFE ${player.lives}/${player.maxLives}`);
          if (player.powerTimer > 0) statuses.push(`BLADE ${player.powerTimer.toFixed(1)}s`);
          if (player.shotTimer > 0) statuses.push(`SHOT+ ${player.shotTimer.toFixed(1)}s`);
          if (player.shield > 0) statuses.push(`BARRIER x${player.shield}`);
          if (player.charging) statuses.push(`CHARGE ${Math.round(Math.min(1, player.charge / 1.15) * 100)}%`);
          if (player.slowTimer > 0) statuses.push(`SLOW ${player.slowTimer.toFixed(1)}s`);
          if (player.dashChainTimer > 0 && player.dashChain > 0) statuses.push(`DASH x${player.dashChain}`);
          if (player.upgrades.length) statuses.push(`UPGRADES ${player.upgrades.slice(-4).join("/")}`);
        statuses.push(`난이도 ${diff().label}`);
          statuses.push(`TEMPO x${(1 + difficulty * 0.25).toFixed(1)}`);
          statuses.push(`DROP ${clearBank}/10 ${Math.round(nextDropChance * 100)}%`);
          itemText.textContent = `ITEMS: ${statuses.join(" | ")}`;
          scoreText.textContent = `${Math.floor(score)} / BEST ${highScore}`;
        }
        renderGame();
      } catch (err) {
        console.error("Blue Tilt Dash loop error:", err);
      } finally {
        requestAnimationFrame(loop);
      }
    }

    // 입력 처리: 데스크톱 키보드와 모바일 전용 터치 패널을 같은 key/action 흐름으로 연결한다.
    window.addEventListener("resize", resize);
    difficultySelect.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-difficulty]");
      if (!button || mode !== "intro") return;
      chooseIntroDifficulty(button.dataset.difficulty);
    });
    startGameButton.addEventListener("click", () => {
      if (mode !== "intro") return;
      introReady = true;
      introDifficultyPicked = true;
      introControlPicked = true;
      if (!difficultySettings[difficultyMode]) difficultyMode = "EASY";
      controlMode = "keyboard";
      resetGame();
    });
    pauseDifficultySelect.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-difficulty]");
      if (!button || !paused || mode !== "bullet") return;
      choosePauseDifficulty(button.dataset.difficulty);
    });
    restartWithDifficulty.addEventListener("click", restartFromPause);
    mobileControls.addEventListener("pointerdown", (event) => {
      const keyButton = event.target.closest("[data-touch-key]");
      const actionButton = event.target.closest("[data-touch-action]");
      if (!keyButton && !actionButton) return;
      event.preventDefault();
      if (mode !== "bullet" || paused || gameOver) return;
      if (keyButton) {
        keys.add(keyButton.dataset.touchKey);
        return;
      }
      const action = actionButton.dataset.touchAction;
      if (action === "dash") dash();
      if (action === "slash") slash();
      if (action === "shot" && !player.charging && player.shotCooldown <= 0) {
        player.charging = true;
        player.charge = 0;
      }
    });
    mobileControls.addEventListener("pointerup", (event) => {
      const keyButton = event.target.closest("[data-touch-key]");
      const actionButton = event.target.closest("[data-touch-action]");
      if (!keyButton && !actionButton) return;
      event.preventDefault();
      if (keyButton) keys.delete(keyButton.dataset.touchKey);
      if (actionButton && actionButton.dataset.touchAction === "shot") fireChargedShot();
    });
    mobileControls.addEventListener("pointercancel", (event) => {
      const keyButton = event.target.closest("[data-touch-key]");
      const actionButton = event.target.closest("[data-touch-action]");
      if (keyButton) keys.delete(keyButton.dataset.touchKey);
      if (actionButton && actionButton.dataset.touchAction === "shot") {
        player.charging = false;
        player.charge = 0;
      }
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "w", "a", "s", "d", "p", "escape", "1", "2", "3"].includes(key)) event.preventDefault();

      if (mode === "intro") {
        return;
      }
      if (mode === "upgrade") {
        applyUpgradeChoice(key);
        return;
      }
      if (gameOver) {
        if (key === " ") resetGame();
        return;
      }
      if (key === "p" || key === "escape") {
        togglePause();
        return;
      }
      if (paused) return;
      if (key === "a") dash();
      if (key === "s") slash();
      if (key === "d" && !event.repeat && mode === "bullet" && player.shotCooldown <= 0) {
        player.charging = true;
        player.charge = 0;
      }
      keys.add(key);
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      if (paused) {
        keys.delete(key);
        return;
      }
      if (key === "d") fireChargedShot();
      keys.delete(key);
    });

    volumeSlider.addEventListener("input", () => {
      setVolume(Number(volumeSlider.value));
      localStorage.setItem("blueTiltVolume", String(volumeSlider.value));
    });

    resize();
    setVolume(Number(volumeSlider.value));
    tryStartIntroAudio();
    enterBulletIntro();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
